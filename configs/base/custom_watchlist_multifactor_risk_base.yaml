extends: custom_watchlist_multifactor_base.yaml

project:
  name: custom_watchlist_multifactor_risk_base

risk:
  enabled: true
  benchmark_code: "510300"
  benchmark_name: "CSI300 ETF"
  benchmark_asset_type: etf
  benchmark_ma_window: 120
  benchmark_drop_window: 20
  benchmark_drop_threshold: -0.08
  benchmark_off_exposure: 0.5
  benchmark_crash_exposure: 0.0
  drawdown_levels:
    - drawdown: 0.10
      exposure: 0.70
    - drawdown: 0.20
      exposure: 0.40
    - drawdown: 0.30
      exposure: 0.0
  protection_drawdown: 0.30
  recovery_drawdown: 0.15
