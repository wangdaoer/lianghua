project:
  name: custom_watchlist_multifactor_base
  initial_cash: 1000000
  data_dir: data
  output_dir: outputs/backtests

data:
  start_date: "20180101"
  end_date: null
  period: daily
  adjust: qfq

universe_file: configs/custom_stocks.csv

strategy:
  name: multi_factor
  max_positions: 5
  allocation_buffer: 0.995
  lot_size: 100
  factor_momentum_window: 60
  factor_reversal_window: 5
  factor_volatility_window: 20
  factor_liquidity_window: 20
  factor_trend_window: 120
  factor_min_history: 120
  factor_rebalance_interval: 5
  factor_weights:
    momentum: 0.35
    trend: 0.25
    reversal: 0.15
    volatility: 0.15
    liquidity: 0.10

costs:
  commission_rate: 0.0003
  slippage_rate: 0.0005
  stamp_tax_rate: 0.0005
