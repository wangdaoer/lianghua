project:
  name: custom_watchlist_thsdk_base
  initial_cash: 1000000
  data_dir: data
  output_dir: outputs/backtests

data:
  start_date: "20180101"
  end_date: null
  period: daily
  adjust: qfq

universe_file: configs/custom_stocks.csv

strategy:
  name: thsdk_monitor
  fast_window: 20
  slow_window: 60
  trend_window: 120
  rsi_window: 14
  rsi_oversold: 35
  rsi_recover: 40
  rsi_exit: 65
  max_positions: 5
  allocation_buffer: 0.995
  lot_size: 100
  min_score: 60

costs:
  commission_rate: 0.0003
  slippage_rate: 0.0005
  stamp_tax_rate: 0.0005
