extends: base/custom_watchlist_multifactor_balanced20_base.yaml

project:
  name: custom_watchlist_multifactor_bear_v2

strategy:
  factor_weights:
    momentum: 0.15
    trend: 0.15
    reversal: 0.25
    volatility: 0.35
    liquidity: 0.10

risk:
  enabled: true
  benchmark_code: "510300"
  benchmark_name: "CSI300 ETF"
  benchmark_asset_type: etf
  benchmark_ma_window: 120
  benchmark_drop_window: 20
  benchmark_drop_threshold: -0.05
  benchmark_off_exposure: 0.35
  benchmark_crash_exposure: 0.0
  drawdown_levels:
    - drawdown: 0.08
      exposure: 0.55
    - drawdown: 0.15
      exposure: 0.30
    - drawdown: 0.25
      exposure: 0.0
  protection_drawdown: 0.25
  recovery_drawdown: 0.12
